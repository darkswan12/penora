<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip & Backup - SIPENORA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-10">

    <div class="bg-green-700 text-white p-6 shadow-md mb-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold">Arsip SIPENORA</h1>
                <p class="text-green-200 mt-1">Halaman Rekapitulasi & Backup Data Penomoran Surat</p>
            </div>
            <a href="index.html" class="bg-white text-green-700 px-4 py-2 rounded font-bold hover:bg-gray-100 transition">Kembali ke Form</a>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 space-y-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <label class="font-semibold text-gray-700">Pilih Tahun:</label>
                <select id="filterTahun" class="border border-gray-300 rounded p-2 focus:ring-green-500">
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                </select>
                <button onclick="loadDataTahun()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded text-gray-800 font-medium transition">Tampilkan</button>
            </div>
            
            <button onclick="downloadPDF()" class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded shadow flex items-center justify-center gap-2 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
                Backup PDF Tahun Ini
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-600">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                        <tr>
                            <th class="px-4 py-3">Tanggal</th>
                            <th class="px-4 py-3">No. Surat Final</th>
                            <th class="px-4 py-3">Bidang</th>
                            <th class="px-4 py-3">Tujuan</th>
                            <th class="px-4 py-3">Perihal</th>
                            <th class="px-4 py-3">Pemohon</th>
                        </tr>
                    </thead>
                    <tbody id="tableArsip">
                        <tr><td colspan="6" class="text-center py-6 text-gray-500">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // MASUKAN KODE SUPABASE LU DI SINI
        const supabaseUrl = 'https://xuliaggpqmgcwflewoyk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1bGlhZ2dwcW1nY3dmbGV3b3lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTg4NjEsImV4cCI6MjA4OTk3NDg2MX0.eme_dVQ0mpSWhxT7tVRyAG6plklgIOiRncz7MU3cmJs';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentData = []; // Simpan data sementara untuk dicetak ke PDF

        // Fungsi Menampilkan Data Berdasarkan Tahun
        async function loadDataTahun() {
            const tahun = document.getElementById('filterTahun').value;
            const tbody = document.getElementById('tableArsip');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-6 text-gray-500">Memuat data...</td></tr>';

            const { data, error } = await _supabase
                .from('sipenora_surat')
                .select('*')
                .gte('tanggal_surat', `${tahun}-01-01`)
                .lte('tanggal_surat', `${tahun}-12-31`)
                .order('nomor_urut', { ascending: true }); // Diurutkan dari nomor 1

            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-6 text-red-500">Gagal memuat data</td></tr>`;
                return;
            }

            currentData = data; // Simpan ke variabel global
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-6 text-gray-500">Tidak ada surat di tahun ${tahun}</td></tr>`;
                return;
            }

            data.forEach(item => {
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="px-4 py-3 whitespace-nowrap">${item.tanggal_surat}</td>
                        <td class="px-4 py-3 font-bold text-blue-600 whitespace-nowrap">${item.nomor_surat_final}</td>
                        <td class="px-4 py-3 text-xs font-semibold"><span class="bg-gray-200 text-gray-700 py-1 px-2 rounded">${item.bidang_tujuan}</span></td>
                        <td class="px-4 py-3">${item.tujuan_surat}</td>
                        <td class="px-4 py-3 text-xs">${item.perihal}</td>
                        <td class="px-4 py-3 text-xs text-gray-500">${item.nama_pemohon}</td>
                    </tr>
                `;
            });
        }

        // Fungsi Generate PDF
        // Fungsi Generate PDF
        function downloadPDF() {
            const tahun = document.getElementById('filterTahun').value;
            if (currentData.length === 0) {
                alert(`Tidak ada data untuk di-backup pada tahun ${tahun}.`);
                return;
            }

            // Inisialisasi jsPDF format Portrait ('p')
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'pt', 'a4'); 

            doc.setFontSize(16);
            doc.text(`Rekapitulasi Penomoran Surat SIPENORA - Tahun ${tahun}`, 40, 40);
            doc.setFontSize(10);
            doc.text(`Dicetak pada: ${new Date().toLocaleDateString('id-ID')}`, 40, 60);

            // 1. Ubah urutan judul kolom di sini
            const tableColumn = ["Tanggal", "Pemohon", "No. Surat Final", "Bidang", "Tujuan", "Perihal"];
            const tableRows = [];

            currentData.forEach(item => {
                // 2. Ubah urutan data yang ditarik agar pas dengan judul kolom
                const rowData = [
                    item.tanggal_surat,
                    item.nama_pemohon,
                    item.nomor_surat_final,
                    item.bidang_tujuan,
                    item.tujuan_surat,
                    item.perihal
                ];
                tableRows.push(rowData);
            });

            // 3. Setting autotable dengan text-wrap dan lebar kolom proporsional
            doc.autoTable({
                head: [tableColumn],
                body: tableRows,
                startY: 80,
                styles: { 
                    fontSize: 8, 
                    cellPadding: 4,
                    overflow: 'linebreak' // Memaksa teks panjang untuk turun ke baris baru
                },
                headStyles: { fillColor: [21, 128, 61] },
                columnStyles: {
                    // Mengatur jatah lebar (width) masing-masing kolom agar rapi di kertas Portrait
                    0: { cellWidth: 50 },  // Tanggal
                    1: { cellWidth: 60 },  // Pemohon
                    2: { cellWidth: 110 }, // No Surat Final
                    3: { cellWidth: 70 },  // Bidang
                    4: { cellWidth: 80 },  // Tujuan
                    5: { cellWidth: 'auto'}// Perihal (Otomatis mengambil sisa ruang kertas)
                }
            });

            // Simpan file
            doc.save(`Backup_SIPENORA_${tahun}.pdf`);
        }

        // Load data saat halaman pertama kali dibuka
        window.onload = loadDataTahun;
    </script>
</body>
</html>
