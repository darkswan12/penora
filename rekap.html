<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip & Backup - SIPENORA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-10">

    <div class="bg-blue-950 text-white p-6 shadow-md mb-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-left">Arsip SIPENORA</h1>
                <p class="text-blue-100 mt-1">Halaman Rekapitulasi & Backup Data Penomoran Surat</p>
            </div>
            <a href="index.html" class="bg-white text-blue-950 px-5 py-2.5 rounded-lg font-bold hover:bg-gray-100 transition shadow-sm text-center w-full md:w-auto">
                Kembali ke Form
            </a>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 space-y-6">
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <label class="font-semibold text-gray-700">Pilih Tahun:</label>
                <select id="filterTahun" class="border border-gray-300 rounded p-2 focus:ring-blue-950">
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                </select>
                <button onclick="loadDataTahun()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded text-gray-800 font-medium transition">Tampilkan</button>
            </div>
            
            <button onclick="downloadPDF()" class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded shadow flex items-center justify-center gap-2 transition">
                📄 Backup PDF Tahun Ini
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-600">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b">
                        <tr>
                            <th class="px-4 py-3 whitespace-nowrap">Tanggal</th>
                            <th class="px-4 py-3 whitespace-nowrap">Bidang</th>
                            <th class="px-4 py-3 whitespace-nowrap">No. Surat Final</th>
                            <th class="px-4 py-3 whitespace-nowrap">Pemohon</th>
                            <th class="px-4 py-3 whitespace-nowrap">Tujuan</th>
                            <th class="px-4 py-3 whitespace-nowrap">Perihal</th>
                        </tr>
                    </thead>
                    <tbody id="tableArsip">
                        <tr><td colspan="6" class="text-center py-6 text-gray-500">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // --- MASUKKAN URL & KEY SUPABASE LU DI SINI ---
        const supabaseUrl = 'https://xuliaggpqmgcwflewoyk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1bGlhZ2dwcW1nY3dmbGV3b3lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzOTg4NjEsImV4cCI6MjA4OTk3NDg2MX0.eme_dVQ0mpSWhxT7tVRyAG6plklgIOiRncz7MU3cmJs';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentData = [];

        async function loadDataTahun() {
            const tahun = document.getElementById('filterTahun').value;
            const tbody = document.getElementById('tableArsip');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-6 text-gray-500">Memuat data...</td></tr>';

            // DOUBLE SORTING: Tanggal ASC, baru Bidang ASC
            const { data, error } = await _supabase
                .from('sipenora_surat')
                .select('*')
                .gte('tanggal_surat', `${tahun}-01-01`)
                .lte('tanggal_surat', `${tahun}-12-31`)
                .order('tanggal_surat', { ascending: true })
                .order('bidang_tujuan', { ascending: true }); 

            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-6 text-red-500">Gagal memuat data</td></tr>`;
                return;
            }

            currentData = data; 
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-6 text-gray-500">Tidak ada surat di tahun ${tahun}</td></tr>`;
                return;
            }

            data.forEach(item => {
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 text-xs">
                        <td class="px-4 py-3 whitespace-nowrap font-medium text-gray-900">${item.tanggal_surat}</td>
                        <td class="px-4 py-3">
                            <span class="inline-block whitespace-nowrap bg-blue-50 text-blue-900 border border-blue-200 py-1 px-2 rounded font-semibold">
                                ${item.bidang_tujuan}
                            </span>
                        </td>
                        <td class="px-4 py-3 font-bold text-blue-950 whitespace-nowrap">${item.nomor_surat_final}</td>
                        <td class="px-4 py-3 font-medium text-gray-600">${item.nama_pemohon}</td>
                        <td class="px-4 py-3 min-w-[150px]">${item.tujuan_surat}</td>
                        <td class="px-4 py-3 min-w-[200px]">${item.perihal}</td>
                    </tr>
                `;
            });
        }

        function downloadPDF() {
            const tahun = document.getElementById('filterTahun').value;
            if (currentData.length === 0) {
                alert(`Tidak ada data untuk di-backup pada tahun ${tahun}.`);
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'pt', 'a4'); 

            doc.setFontSize(16);
            doc.text(`Rekapitulasi Penomoran Surat SIPENORA - Tahun ${tahun}`, 40, 40);
            doc.setFontSize(10);
            doc.text(`Urutan: Tanggal & Bidang | Dicetak pada: ${new Date().toLocaleDateString('id-ID')}`, 40, 60);

            const tableColumn = ["Tanggal", "Bidang", "No. Surat Final", "Pemohon", "Tujuan", "Perihal"];
            const tableRows = [];

            currentData.forEach(item => {
                const rowData = [
                    item.tanggal_surat,
                    item.bidang_tujuan,
                    item.nomor_surat_final,
                    item.nama_pemohon,
                    item.tujuan_surat,
                    item.perihal
                ];
                tableRows.push(rowData);
            });

            doc.autoTable({
                head: [tableColumn],
                body: tableRows,
                startY: 80,
                theme: 'grid', 
                styles: { 
                    fontSize: 7, 
                    cellPadding: 4,
                    overflow: 'linebreak',
                    lineColor: [200, 200, 200], 
                    lineWidth: 0.5 
                },
                headStyles: { 
                    fillColor: [23, 37, 84], 
                    textColor: [255, 255, 255],
                    lineColor: [23, 37, 84]
                },
                columnStyles: {
                    0: { cellWidth: 60 },
                    1: { cellWidth: 100 },
                    2: { cellWidth: 120 },
                    3: { cellWidth: 80 },
                    4: { cellWidth: 90 },
                    5: { cellWidth: 'auto'}
                }
            });

            doc.save(`Rekap_SIPENORA_${tahun}.pdf`);
        }

        window.onload = loadDataTahun;
    </script>
</body>
</html>
