<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPENORA - Permintaan Nomor Surat</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-10">

    <div class="bg-blue-950 text-white p-6 shadow-md mb-6">
        <div class="max-w-3xl mx-auto flex flex-col items-center justify-center gap-4 text-center">
            <div>
                <h1 class="text-3xl font-bold">SIPENORA</h1>
                <p class="text-blue-100 mt-1">Sistem Permintaan Nomor Surat - Lapas Kelas 1 Tangerang</p>
            </div>
            <a href="rekap.html" class="bg-white text-blue-950 px-5 py-2.5 rounded-lg font-bold hover:bg-gray-100 transition shadow-sm w-full md:w-auto text-center">
                Buka Arsip & Backup
            </a>
        </div>
    </div>

    <div class="max-w-3xl mx-auto px-4 space-y-6">
        <form id="formSipenora" class="space-y-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 border-t-4 border-t-blue-950">
                <h2 class="text-xl font-semibold mb-4 text-gray-800">Data Pemohon & Surat</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nama Pemohon <span class="text-red-500">*</span></label>
                        <input type="text" id="nama_pemohon" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-blue-950 focus:border-blue-950" required>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Surat <span class="text-red-500">*</span></label>
                        <input type="date" id="tanggal_surat" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-blue-950 focus:border-blue-950" required>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Konsep Nomor Surat <span class="text-red-500">*</span></label>
                        <input type="text" id="konsep_nomor" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-blue-950 focus:border-blue-950" placeholder="Contoh: PAS.1-UM.01.01" required>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tujuan Surat <span class="text-red-500">*</span></label>
                        <input type="text" id="tujuan_surat" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-blue-950 focus:border-blue-950" required>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Perihal <span class="text-red-500">*</span></label>
                        <textarea id="perihal" rows="2" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-blue-950 focus:border-blue-950" required></textarea>
                    </div>

                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-xl font-semibold mb-4 text-gray-800">Bagian Atau Bidang Pengaju</h2>
                <div class="space-y-3">
                    <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="bidang_tujuan" value="Bagian Tata Usaha" class="h-5 w-5 text-blue-950" required>
                        <span class="text-sm">Bagian Tata Usaha</span>
                    </label>
                    <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="bidang_tujuan" value="Bidang Pembinaan" class="h-5 w-5 text-blue-950">
                        <span class="text-sm">Bidang Pembinaan</span>
                    </label>
                    <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="bidang_tujuan" value="Bidang Kegiatan Kerja" class="h-5 w-5 text-blue-950">
                        <span class="text-sm">Bidang Kegiatan Kerja</span>
                    </label>
                    <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="bidang_tujuan" value="Bidang Administrasi Keamanan dan Ketertiban" class="h-5 w-5 text-blue-950">
                        <span class="text-sm">Bidang Administrasi Keamanan dan Ketertiban</span>
                    </label>
                    <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 transition">
                        <input type="radio" name="bidang_tujuan" value="Kesatuan Pengamanan Lembaga Pemasyarakatan" class="h-5 w-5 text-blue-950">
                        <span class="text-sm">Kesatuan Pengamanan Lembaga Pemasyarakatan</span>
                    </label>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-blue-950 hover:bg-blue-900 text-white font-bold py-3 px-4 rounded-xl shadow-md transition duration-200">
                Minta Nomor Surat
            </button>
        </form>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mt-8">
            <h2 class="text-lg font-bold text-gray-800 mb-4">5 Surat Terakhir Terbit</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-600">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                        <tr>
                            <th class="px-4 py-3">No. Surat Final</th>
                            <th class="px-4 py-3">Tujuan & Perihal</th>
                            <th class="px-4 py-3">Bidang</th>
                        </tr>
                    </thead>
                    <tbody id="tableRiwayat"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SETTING SUPABASE ---
        const supabaseUrl = '';
        const supabaseKey = '';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // --- 2. FUNGSI LOAD DATA ---
        async function loadRiwayat() {
            const { data, error } = await _supabase
                .from('sipenora_surat')
                .select('*')
                .order('id', { ascending: false })
                .limit(5);

            if (error) return;

            const tbody = document.getElementById('tableRiwayat');
            tbody.innerHTML = '';
            data.forEach(item => {
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="px-4 py-3 font-bold text-blue-950 whitespace-nowrap">${item.nomor_surat_final}</td>
                        <td class="px-4 py-3">
                            <div class="font-medium text-gray-800">${item.tujuan_surat}</div>
                            <div class="text-xs text-gray-500 mt-1">${item.perihal}</div>
                        </td>
                        <td class="px-4 py-3 text-xs font-semibold">
                            <span class="inline-block whitespace-nowrap bg-gray-100 text-gray-700 py-1 px-2 rounded">${item.bidang_tujuan}</span>
                        </td>
                    </tr>`;
            });
        }

        // --- 3. SUBMIT FORM ---
        document.getElementById('formSipenora').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerText = "Memproses...";
            btnSubmit.disabled = true;

            const p_nama = document.getElementById('nama_pemohon').value;
            const p_tanggal = document.getElementById('tanggal_surat').value;
            const p_konsep = document.getElementById('konsep_nomor').value;
            const p_tujuan = document.getElementById('tujuan_surat').value;
            const p_perihal = document.getElementById('perihal').value;
            const p_bidang = document.querySelector('input[name="bidang_tujuan"]:checked').value;

            try {
                const tahunSurat = new Date(p_tanggal).getFullYear();

                const { data: lastData } = await _supabase
                    .from('sipenora_surat')
                    .select('nomor_urut')
                    .eq('bidang_tujuan', p_bidang)
                    .gte('tanggal_surat', `${tahunSurat}-01-01`)
                    .lte('tanggal_surat', `${tahunSurat}-12-31`)
                    .order('nomor_urut', { ascending: false })
                    .limit(1);

                let nomorBaru = 1;
                if (lastData && lastData.length > 0) {
                    nomorBaru = lastData[0].nomor_urut + 1;
                }

                const nomorFinal = `${p_konsep}-${nomorBaru}`;

                const { error } = await _supabase.from('sipenora_surat').insert([{
                    nama_pemohon: p_nama,
                    tanggal_surat: p_tanggal,
                    konsep_nomor: p_konsep,
                    tujuan_surat: p_tujuan,
                    perihal: p_perihal,
                    bidang_tujuan: p_bidang,
                    nomor_surat_final: nomorFinal,
                    nomor_urut: nomorBaru 
                }]);

                if (error) throw error;

                alert(`BERHASIL!\nNomor Surat: ${nomorFinal}`);
                document.getElementById('formSipenora').reset(); 
                loadRiwayat(); 

            } catch (error) {
                alert("Kesalahan: " + error.message);
            } finally {
                btnSubmit.innerText = "Minta Nomor Surat";
                btnSubmit.disabled = false;
            }
        });

        loadRiwayat();
    </script>
</body>
</html>
